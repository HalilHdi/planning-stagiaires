name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/planning-stagiaires
            git pull
            npm install
            npm run build

            sudo rm -rf /var/www/planning-stagiaires/*
            sudo cp -r dist/* /var/www/planning-stagiaires/
            sudo chown -R www-data:www-data /var/www/planning-stagiaires

            cd backend
            npm install
            pm2 restart stagiaires.api

            sudo systemctl reload nginx